    <button onclick="showMessage()">Click</button>

    <script>
        function showMessage() {
            alert("Button clicked"); < !DOCTYPE html >
                <
                html lang = "en" >
                <
                head >
                <
                meta charset = "UTF-8" >
                <
                title > Notes App < /title>

            <
            style >
                body {
                    font - family: Arial;
                    background: #0f172a;
    color: white;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  # noteInput {
                        width: 80 % ;
                        padding: 10 px;
                    }

                    button {
                        padding: 10 px;
                        background: #3b82f6;
    color: white;
    border: none;
    cursor: pointer;
  }

  .notes-container {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .note {
    background: # 1e293 b;
                        padding: 10 px;
                        border - radius: 8 px;
                        position: relative;
                    }

                    .delete - btn {
                            position: absolute;
                            top: 5 px;
                            right: 5 px;
                            background: red;
                            border: none;
                            color: white;
                            cursor: pointer;
                        } <
                        /style> < /
                        head >

                        <
                        body >

                        <
                        h1 > 📝Notes App < /h1>

                    <
                    input type = "text"
                    id = "noteInput"
                    placeholder = "Write a note..." >
                        <
                        button onclick = "addNote()" > Add < /button>

                    <
                    div class = "notes-container"
                    id = "notesContainer" > < /div>

                    <
                    script >
                        let notes = JSON.parse(localStorage.getItem("notes")) || [];

                    function renderNotes() {
                        const container = document.getElementById("notesContainer");
                        container.innerHTML = "";

                        notes.forEach((note, index) => {
                            const div = document.createElement("div");
                            div.classList.add("note");

                            div.innerHTML = `
      ${note}
      <button class="delete-btn" onclick="deleteNote(${index})">X</button>
    `;

                            container.appendChild(div);
                        });
                    }

                    function addNote() {
                        const input = document.getElementById("noteInput");
                        const text = input.value.trim();

                        if (!text) return;

                        notes.push(text);
                        localStorage.setItem("notes", JSON.stringify(notes));

                        input.value = "";
                        renderNotes();
                    }

                    function deleteNote(index) {
                        notes.splice(index, 1);
                        localStorage.setItem("notes", JSON.stringify(notes));
                        renderNotes();
                    }

                    // Load notes on start
                    renderNotes();
    </script>

</body>

</html>
}
</script>

</body>
