<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .chat-container {
            width: 400px;
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
        }
        
        .chat-box {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .message {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }
        
        .user {
            background: #3b82f6;
            text-align: right;
        }
        
        .bot {
            background: #10b981;
            text-align: left;
        }
        
        input {
            width: 75%;
            padding: 8px;
        }
        
        button {
            padding: 8px;
            background: #3b82f6;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>
        <input type="text" id="userInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value;

            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            // Dummy response (replace with API)
            const response = await getBotResponse(message);

            addMessage(response, "bot");
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.classList.add("message", sender);
            div.innerText = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Fake AI logic (you can replace with API)
        async function getBotResponse(msg) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve("You said: " + msg);
                }, 500);
            });
        }
    </script>

</body>

</html>
